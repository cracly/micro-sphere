name: Deploy Next.js site to GitHub Pages

on:
  push:
    branches: ["main"] # or your default branch
  # Also run when data is updated
  workflow_run:
    workflows: ["Update Weather Data"]
    types:
      - completed
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: cd frontend && npm ci

      # Add caching for Next.js build
      - name: Cache Next.js build
        uses: actions/cache@v6
        with:
          path: |
            frontend/.next/cache
            frontend/out
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/**/*.js', 'frontend/**/*.jsx', 'frontend/**/*.ts', 'frontend/**/*.tsx', 'backend/data/processed_*.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build with Next.js
        env:
          # For GitHub Pages subdirectory, set this to your repo name
          # For custom domain, leave this empty
          NEXT_PUBLIC_BASE_PATH: ''
        run: cd frontend && npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./frontend/out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
